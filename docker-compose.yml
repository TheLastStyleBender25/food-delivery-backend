services:

  postgres:
    image: postgres:17
    restart: unless-stopped

    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
  
  redis:
    image: redis:8-alpine
    restart: unless-stopped

    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3.13-management
    restart: unless-stopped

    ports:
      - "5672:5672"
      - "15672:15672"

  auth-service:
    build:
      context: ./services/auth-service
    restart: unless-stopped

    env_file:
    - ./services/auth-service/.env

    ports:
      - "8000:8000"
    

    depends_on:
      - postgres
      - redis
      - rabbitmq

  celery-worker:
    build:
      context: ./services/auth-service
      
    restart: unless-stopped

    env_file:
      - ./services/auth-service/.env

    command: celery -A app.core.celery_app.celery_app worker --loglevel=info

    depends_on:
      - postgres
      - rabbitmq
      - redis
    
  nginx:
    image: nginx:alpine

    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt/live/auth.frostbite.co.in/fullchain.pem:/etc/nginx/certs/fullchain.pem:ro
      - /etc/letsencrypt/live/auth.frostbite.co.in/privkey.pem:/etc/nginx/certs/privkey.pem:ro

    depends_on:
      - auth-service

volumes:
  postgres_data: