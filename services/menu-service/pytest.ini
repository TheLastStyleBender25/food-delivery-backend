[pytest]
pythonpath = .
asyncio_mode = auto


#pytest.ini is a configuration file for pytest,
#placed at the root of your project.
#It tells pytest how to behave — things like where to find your code,
#which folders to scan for tests, custom markers, and so on.

#[pytest] — This is an INI section header. It tells the parser
#"everything below this line is configuration for pytest."
#The file can technically have other sections too, but pytest only reads what's inside [pytest].

#pythonpath = . — This adds the current directory (. = project root) to Python's sys.path before tests run.